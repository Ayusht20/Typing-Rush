<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>TypingRush - Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-register">
  <div class="background-letters">
    <span style="left:10%">A</span>
    <span style="left:25%">T</span>
    <span style="left:40%">Y</span>
    <span style="left:60%">P</span>
    <span style="left:75%">E</span>
    <span style="left:90%">X</span>
</div>
  <h1 class="brand">TypingRush</h1>
  <div class="glass-card">

    <h2>Register</h2>
    <input id="username" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />
    <button id="registerBtn">Register</button>
    <p>Already have an account? <a href="login.html">Login</a></p>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="auth.js"></script>
</body>
</html>
